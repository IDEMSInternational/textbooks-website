# Run checks on every pull request (and direct pushes to `main`) so regressions
# are caught before they reach the deploy workflow. Type-checks, runs the logic +
# data validation test scripts, and does a full static build.
name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs for the same branch/PR to save runner time.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22 # match the project's required Node version
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run check
      - name: Test (filtering logic + data validation)
        run: npm test
      - name: Build
        run: npm run build
