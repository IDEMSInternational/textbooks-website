# Build the Astro site and deploy it to GitHub Pages on every push to `main`.
# Uses the official Astro action (auto-detects npm, runs `astro build`) and the
# GitHub Pages deploy actions. Pages must be enabled with "GitHub Actions" as
# the source (Settings → Pages) — this repo was configured that way at setup.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual runs from the Actions tab

# Permissions required to deploy to GitHub Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build with Astro
        uses: withastro/action@v3
        with:
          node-version: 22 # match the project's required Node version

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
